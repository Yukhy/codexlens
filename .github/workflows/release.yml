name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to build and upload assets for"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  mac:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            workflow_dispatch) tag="$INPUT_TAG" ;;
            release) tag="$RELEASE_TAG" ;;
            *) tag="$REF_NAME" ;;
          esac

          if [[ ! "$tag" =~ ^v[0-9] ]]; then
            echo "::error title=Invalid tag::Expected a v* version tag, got '$tag'."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Detect release mode
        id: release_mode
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          has_signing=0
          if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            has_signing=1
          fi

          has_apple_id=0
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            has_apple_id=1
          fi

          has_api_key=0
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            has_api_key=1
          fi

          if [[ "$has_signing" -eq 1 && ( "$has_apple_id" -eq 1 || "$has_api_key" -eq 1 ) ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release mode::Building a Developer ID signed and notarized macOS release."
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release mode::Apple signing/notarization secrets are incomplete or absent. Building an unsigned macOS release."
          fi

      - name: Build signed and notarized artifacts
        if: steps.release_mode.outputs.mode == 'signed'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        # Invoke electron-builder directly (not via npm scripts) so this
        # workflow can also backfill older tags whose package.json predates
        # the current script names.
        run: npx electron-builder --mac dmg zip --publish never --x64 --arm64

      - name: Build unsigned artifacts
        if: steps.release_mode.outputs.mode == 'unsigned'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg zip --publish never --config.mac.identity=null --config.mac.notarize=false --x64 --arm64

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          assets=(release/*.dmg release/*.zip release/*.blockmap)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error title=No artifacts::electron-builder produced no DMG/ZIP files in release/."
            exit 1
          fi

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes --verify-tag
          fi

          gh release upload "$TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
