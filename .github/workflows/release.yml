name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to upload assets to (leave empty to only build)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  mac:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          # When dispatched with a tag input, build that tag's source so the
          # uploaded assets match the release they are attached to.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Detect release mode
        id: release_mode
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail

          has_signing=0
          if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            has_signing=1
          fi

          has_apple_id=0
          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            has_apple_id=1
          fi

          has_api_key=0
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            has_api_key=1
          fi

          if [[ "$has_signing" -eq 1 && ( "$has_apple_id" -eq 1 || "$has_api_key" -eq 1 ) ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release mode::Building a Developer ID signed and notarized macOS release."
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release mode::Apple signing/notarization secrets are incomplete or absent. Building an unsigned macOS release."
          fi

      - name: Build, sign, and notarize
        if: steps.release_mode.outputs.mode == 'signed'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          npm run dist:mac -- --x64 --arm64

      - name: Build unsigned release
        if: steps.release_mode.outputs.mode == 'unsigned'
        shell: bash
        run: |
          set -euo pipefail
          npm run dist:mac:unsigned -- --x64 --arm64

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          tag="${RELEASE_TAG_INPUT:-$GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --generate-notes --verify-tag
          fi

          assets=(release/*.dmg release/*.zip)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi
          gh release upload "$tag" "${assets[@]}" --clobber

          extra_assets=()
          for extra in release/latest-mac.yml release/*.blockmap; do
            [[ -e "$extra" ]] && extra_assets+=("$extra")
          done
          if [[ "${#extra_assets[@]}" -gt 0 ]]; then
            gh release upload "$tag" "${extra_assets[@]}" --clobber
          fi

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') && github.event.inputs.tag == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            release/*.dmg
            release/*.zip
