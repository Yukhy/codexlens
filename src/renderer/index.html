<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;" />
    <title>CodexLens</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 data-i18n="appTitle">CodexLens</h1>
          <p id="generated-at">Loading local activity</p>
        </div>
        <div class="topbar-actions">
          <button id="settings" class="icon-button" title="Settings" data-i18n-title="settings" aria-label="Settings">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1c.895.264 1.318 1.286.872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
            </svg>
          </button>
          <button id="refresh" class="icon-button" title="Refresh" data-i18n-title="refresh" aria-label="Refresh">
            <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/>
              <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="summary app-view" id="summary-view" aria-label="Summary">
        <div class="summary-card summary-active"><span id="active-count">0</span><label data-i18n="active">Active</label></div>
        <div class="summary-card summary-stalled"><span id="stalled-count">0</span><label data-i18n="stalled">Stalled</label></div>
        <div class="summary-card summary-failed"><span id="failed-count">0</span><label data-i18n="failed">Failed</label></div>
        <div class="summary-card summary-process"><span id="process-count">0</span><label data-i18n="mcpPids">MCP PIDs</label></div>
      </section>

      <section class="filters app-view" id="filters-view" aria-label="Filters">
        <div class="filter-buttons" role="group" aria-label="Run status filter">
          <button class="filter-button selected" data-filter="active" data-i18n="filterActive" type="button">Active</button>
          <button class="filter-button" data-filter="attention" data-i18n="filterAttention" type="button">Attention</button>
          <button class="filter-button" data-filter="completed" data-i18n="filterCompleted" type="button">Completed</button>
          <button class="filter-button" data-filter="all" data-i18n="filterAll" type="button">All</button>
        </div>
        <input id="run-filter" class="filter-input" type="search" placeholder="Filter path, job, source" data-i18n-placeholder="filterPlaceholder" />
      </section>

      <section class="layout app-view" id="main-view">
        <div class="run-list" id="run-list" aria-label="Observed runs"></div>
        <aside class="detail" id="detail" aria-label="Run detail">
          <p class="empty" data-i18n="selectRun">Select a run to inspect local status.</p>
        </aside>
      </section>

      <section class="settings-view hidden" id="settings-view" aria-label="Settings">
        <div class="settings-head">
          <div>
            <h2 data-i18n="settingsTitle">Settings</h2>
            <p data-i18n="settingsDescription">Language and update preferences.</p>
          </div>
          <button id="back-to-runs" class="secondary-button" type="button" data-i18n="back">Back</button>
        </div>

        <div class="settings-section">
          <h3 data-i18n="languageTitle">Language</h3>
          <div class="language-options" role="group" aria-label="Language">
            <button class="language-button selected" data-language="en" type="button">
              <span>English</span>
              <small>EN</small>
            </button>
            <button class="language-button" data-language="ja" type="button">
              <span>日本語</span>
              <small>日</small>
            </button>
            <button class="language-button" data-language="zh" type="button">
              <span>中文</span>
              <small>中</small>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <h3 data-i18n="startupTitle">Startup</h3>
          <label class="toggle-row" for="launch-at-login">
            <input type="checkbox" id="launch-at-login" />
            <span>
              <span class="toggle-label" data-i18n="launchAtLogin">Launch CodexLens at login</span>
              <small class="toggle-hint" id="launch-at-login-hint" data-i18n="launchAtLoginHint">Starts the menu bar app automatically when you log in.</small>
            </span>
          </label>
        </div>

        <div class="settings-section">
          <h3 data-i18n="updatesTitle">Updates</h3>
          <p class="settings-copy" data-i18n="updatesDescription">Check whether a newer version is available on GitHub Releases.</p>
          <p class="version-line"><span data-i18n="currentVersion">Current version</span>: <span id="current-version">—</span></p>
          <div class="update-actions">
            <button id="check-for-updates" class="primary-button" type="button" data-i18n="checkForUpdates">Check for updates</button>
            <button id="open-latest-release" class="secondary-button" type="button" data-i18n="openLatestRelease">Open latest release</button>
          </div>
          <div id="update-status" class="update-status hidden" aria-live="polite"></div>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
